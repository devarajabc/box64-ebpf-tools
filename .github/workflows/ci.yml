name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Syntax check
        run: python3 -m py_compile box64_dynarec.py box64_memleak.py box64_steam.py
      - name: Lint
        run: ruff check box64_dynarec.py box64_memleak.py box64_steam.py tests/
      - name: Unit tests
        run: pytest tests/ -v --tb=short --ignore=tests/test_upstream_compat.py

  bpf-compile:
    name: BPF C compilation test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install BCC
        run: sudo apt-get update && sudo apt-get install -y python3-bpfcc
      - name: Compile all BPF programs
        run: sudo python3 tests/test_bpf_compile.py

  upstream-compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Clone upstream Box64 (shallow)
        run: git clone --depth=1 https://github.com/ptitSeb/box64.git /tmp/box64
      - name: Check upstream compatibility
        env:
          BOX64_SRC_DIR: /tmp/box64
        run: pytest tests/test_upstream_compat.py -v --tb=short
