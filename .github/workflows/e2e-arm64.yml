name: E2E eBPF Integration (ARM64)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  e2e-box64:
    name: eBPF tools against live Box64
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-bpfcc cmake gcc g++ git gcc-x86-64-linux-gnu

      - name: Cross-compile custom test binaries (x86_64)
        run: |
          x86_64-linux-gnu-gcc -O1 -o /tmp/dynarec_stress tests/dynarec_stress.c
          x86_64-linux-gnu-gcc -O1 -lpthread -o /tmp/steam_lifecycle tests/steam_lifecycle.c
          x86_64-linux-gnu-gcc -O1 -ldl -o /tmp/memleak_leaker tests/memleak_leaker.c
          file /tmp/dynarec_stress /tmp/steam_lifecycle /tmp/memleak_leaker

      - name: Clone Box64 source
        run: git clone --depth=1 https://github.com/ptitSeb/box64.git /tmp/box64-src

      - name: Get Box64 commit hash
        id: box64-hash
        run: echo "hash=$(git -C /tmp/box64-src rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache Box64 build
        id: cache-box64
        uses: actions/cache@v4
        with:
          path: /tmp/box64-build
          key: box64-arm64-${{ steps.box64-hash.outputs.hash }}

      - name: Build Box64
        if: steps.cache-box64.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/box64-build && cd /tmp/box64-build
          cmake /tmp/box64-src -DARM_DYNAREC=ON -DCMAKE_BUILD_TYPE=RelWithDebInfo
          make -j$(nproc)

      - name: Run eBPF integration tests
        run: |
          sudo python3 tests/test_ebpf_integration.py \
            --box64 /tmp/box64-build/box64 \
            --test-bin /tmp/dynarec_stress /tmp/steam_lifecycle /tmp/memleak_leaker \
            --test-dir /tmp/box64-src/tests
        timeout-minutes: 15
